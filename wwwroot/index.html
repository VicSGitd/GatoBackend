<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Prueba de SignalR - Gato Completo</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.0/signalr.min.js"></script>
    <style>
        :root {
            --primary-color: #4A90E2;
            --bg-color: #f4f7f6;
            --cell-bg: #ffffff;
            --text-color: #333333;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        
        .game-container {
            background-color: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }

        h2 { margin-top: 0; color: var(--primary-color); }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            justify-content: center;
        }

        input[type="text"] {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 16px;
            outline: none;
            width: 60%;
        }

        button {
            padding: 10px 15px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button:hover { background-color: #357ABD; }

        .status-area {
            margin: 15px 0;
            min-height: 50px; /* Evita que el layout salte */
        }

        #status { font-weight: normal; margin: 5px 0; font-size: 16px;}
        #turnStatus { margin: 5px 0; font-size: 18px;}

        /* Estilos del tablero */
        #board {
            display: grid;
            grid-template-columns: repeat(3, 100px); 
            gap: 10px;
            justify-content: center;
            margin-top: 20px;
            display: none; /* Oculto inicialmente */
        }
        
        .cell {
            width: 100px;
            height: 100px;
            font-size: 48px;
            font-weight: bold;
            cursor: pointer;
            background-color: var(--cell-bg);
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            color: #333;
            transition: transform 0.1s, background-color 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
        }
        
        .cell:hover { 
            background-color: #f9f9f9; 
            transform: scale(1.02);
        }

        #btnRestart {
            display: none; 
            margin: 0 auto 15px auto; 
            background-color: #27ae60;
            width: 100%;
        }

        #btnRestart:hover { background-color: #219653; }
    </style>
</head>
<body>

    <div class="game-container">
        <h2>🎮 Gato en Línea</h2>
        
        <div class="controls">
            <input type="text" id="playerName" placeholder="Tu nombre..." />
            <button onclick="buscarPartida()">Buscar Partida</button>
        </div>

        <div class="status-area">
            <h3 id="status" style="color: gray;">Desconectado</h3>
            <h3 id="turnStatus"></h3>
        </div>

        <button id="btnRestart" onclick="reiniciarPartida()">🔄 Volver a Jugar</button>

        <div id="board">
            <button class="cell" onclick="hacerMovimiento(0)" id="cell-0"></button>
            <button class="cell" onclick="hacerMovimiento(1)" id="cell-1"></button>
            <button class="cell" onclick="hacerMovimiento(2)" id="cell-2"></button>
            <button class="cell" onclick="hacerMovimiento(3)" id="cell-3"></button>
            <button class="cell" onclick="hacerMovimiento(4)" id="cell-4"></button>
            <button class="cell" onclick="hacerMovimiento(5)" id="cell-5"></button>
            <button class="cell" onclick="hacerMovimiento(6)" id="cell-6"></button>
            <button class="cell" onclick="hacerMovimiento(7)" id="cell-7"></button>
            <button class="cell" onclick="hacerMovimiento(8)" id="cell-8"></button>
        </div>
    </div>

    <script>
        let miRoomId = "";

        // Conectar al Hub
        const connection = new signalR.HubConnectionBuilder()
            .withUrl("/gamehub")
            .build();

        // --- ESCUCHAR EVENTOS ---
        connection.on("WaitingForOpponent", () => {
            document.getElementById("status").innerText = "Esperando a otro jugador...";
            document.getElementById("status").style.color = "orange";
        });

        connection.on("GameStarted", (game) => {
            miRoomId = game.roomId;
            document.getElementById("status").innerText = "¡Juego Iniciado!";
            document.getElementById("status").style.color = "blue";
            document.getElementById("board").style.display = "grid"; // Mostramos el tablero
            actualizarInterfaz(game);
        });

        connection.on("UpdateBoard", (game) => {
            actualizarInterfaz(game);
        });

        connection.on("GameRestarted", (game) => {
            document.getElementById("btnRestart").style.display = "none"; // Ocultar el botón
            actualizarInterfaz(game); // Redibujar el tablero vacío
        });

        connection.start()
            .then(() => {
                document.getElementById("status").innerText = "Conectado al servidor";
                document.getElementById("status").style.color = "green";
            })
            .catch(err => {
                console.error(err);
                document.getElementById("status").innerText = "Error al conectar";
                document.getElementById("status").style.color = "red";
            });

        // --- ACCIONES ---
        function buscarPartida() {
            const name = document.getElementById("playerName").value || "Jugador";
            connection.invoke("FindMatch", name).catch(err => console.error(err));
        }

        function hacerMovimiento(posicion) {
            if(!miRoomId) return;
            // Solo mandamos el movimiento al servidor. El servidor decide si es válido.
            connection.invoke("MakeMove", miRoomId, posicion).catch(err => console.error(err));
        }

        function reiniciarPartida() {
            if(!miRoomId) return;
            connection.invoke("RestartGame", miRoomId).catch(err => console.error(err));
        }

        // --- ACTUALIZAR LA PANTALLA ---
        function actualizarInterfaz(game) {
            // 1. Dibujar el tablero recorriendo el arreglo del servidor
            for(let i = 0; i < 9; i++) {
                const boton = document.getElementById(`cell-${i}`);
                boton.innerText = game.board[i] || ""; 
                
                // Darle color a las X y O
                if(game.board[i] === "X") boton.style.color = "#E74C3C"; // Rojo
                else if(game.board[i] === "O") boton.style.color = "#3498DB"; // Azul
                else boton.style.color = "#333";
            }

            // 2. Revisar el estado del juego y los turnos
            const turnStatus = document.getElementById("turnStatus");
            
            // LÓGICA CORREGIDA (se eliminó el error de sintaxis)
            if (game.isGameOver) {
                document.getElementById("btnRestart").style.display = "block";

                if (game.winnerConnectionId === "Empate") {
                    turnStatus.innerText = "¡Empate! Reiniciando...";
                    turnStatus.style.color = "orange";
                    setTimeout(() => reiniciarPartida(), 2000); 
                } else {
                    if (game.winnerConnectionId === connection.connectionId) {
                        turnStatus.innerText = "¡FELICIDADES, GANASTE! 🎉";
                        turnStatus.style.color = "#27ae60"; // Verde
                    } else {
                        turnStatus.innerText = "¡LÁSTIMA, PERDISTE! 😢";
                        turnStatus.style.color = "#e74c3c"; // Rojo
                    }
                }
            } else {
                document.getElementById("btnRestart").style.display = "none";
                
                if (game.currentTurnConnectionId === connection.connectionId) {
                    turnStatus.innerText = "Es tu turno...";
                    turnStatus.style.color = "#27ae60"; // Verde
                } else {
                    turnStatus.innerText = "Esperando al oponente...";
                    turnStatus.style.color = "orange";
                }
            }
        }
    </script>
</body>
</html>
