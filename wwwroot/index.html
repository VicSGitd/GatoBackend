<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gato Multijugador - Versión Final</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.0/signalr.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 600px; margin: auto; }
        .panel { background: #f9f9f9; padding: 20px; border: 1px solid #ddd; margin-bottom: 20px; border-radius: 8px; }
        input { padding: 8px; margin: 5px 0; width: 100%; box-sizing: border-box; }
        button { padding: 10px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 4px; width: 100%; margin-top: 5px; font-weight: bold; }
        button:hover { background: #0056b3; }
        .btn-secondary { background: #6c757d; }
        .btn-secondary:hover { background: #5a6268; }
        .btn-danger { background: #dc3545; }
        .btn-danger:hover { background: #c82333; }
        .btn-success { background: #28a745; }
        .btn-success:hover { background: #218838; }
        
        /* Ocultar la zona de juego al principio */
        #gameZone { display: none; }

        /* Diseño profesional del tablero */
        #board { display: grid; grid-template-columns: repeat(3, 100px); gap: 5px; margin-top: 20px; justify-content: center; display: none; }
        
        .cell { 
            width: 100px; 
            height: 100px; 
            font-size: 50px; 
            font-family: sans-serif;
            font-weight: bold; 
            cursor: pointer; 
            background-color: #f8f9fa; 
            border: 2px solid #343a40; 
            color: #212529; 
            transition: background-color 0.2s; 
        }
        
        .cell:hover { background-color: #e2e6ea; }
    </style>
</head>
<body>
    <h2 style="text-align: center;">🎮 Gato Multijugador en C#</h2>
    
    <div id="loginZone" class="panel">
        <h3>Inicia Sesión o Regístrate</h3>
        <input type="text" id="txtUsername" placeholder="Nombre de usuario" />
        <input type="password" id="txtPassword" placeholder="Contraseña" />
        
        <button onclick="login()">Iniciar Sesión</button>
        <button onclick="register()" class="btn-secondary">Registrarse</button>
        <p id="loginMessage" style="color: red; text-align: center; font-weight: bold;"></p>
    </div>

    <div id="gameZone" class="panel">
        <h3>Bienvenido, <span id="lblUsername" style="color: #007bff;"></span>!</h3>
        <p style="background: #e9ecef; padding: 10px; border-radius: 5px; text-align: center;">
            Estadísticas 🏆 -> Ganados: <b id="lblWon" style="color: green;">0</b> | 
            Perdidos: <b id="lblLost" style="color: red;">0</b> | 
            Empates: <b id="lblDraws" style="color: orange;">0</b>
        </p>
        
        <button onclick="buscarPartida()" id="btnBuscar">1. Buscar Partida</button>
        <button onclick="rendirse()" id="btnRendirse" class="btn-danger" style="display: none;">Abandonar Partida</button>
        <button onclick="reiniciarPartida()" id="btnRestart" class="btn-success" style="display: none;">🔄 Volver a Jugar</button>
        <button onclick="cerrarSesion()" class="btn-secondary" style="margin-top: 20px;">🚪 Cerrar Sesión</button>

        <h3 id="status" style="color: blue; text-align: center;">Conectando al servidor...</h3>
        <h4 id="opponentName" style="color: darkmagenta; text-align: center; display: none;"></h4>
        <h3 id="turnStatus" style="color: red; text-align: center; height: 30px;"></h3>

        <div id="board">
            <button class="cell" onclick="hacerMovimiento(0)" id="cell-0"></button>
            <button class="cell" onclick="hacerMovimiento(1)" id="cell-1"></button>
            <button class="cell" onclick="hacerMovimiento(2)" id="cell-2"></button>
            <button class="cell" onclick="hacerMovimiento(3)" id="cell-3"></button>
            <button class="cell" onclick="hacerMovimiento(4)" id="cell-4"></button>
            <button class="cell" onclick="hacerMovimiento(5)" id="cell-5"></button>
            <button class="cell" onclick="hacerMovimiento(6)" id="cell-6"></button>
            <button class="cell" onclick="hacerMovimiento(7)" id="cell-7"></button>
            <button class="cell" onclick="hacerMovimiento(8)" id="cell-8"></button>
        </div>
    </div>

    <script>
        let miRoomId = "";
        let miUsuario = ""; 
        let connection = null;

        // --- SISTEMA DE AUTENTICACIÓN ---
        async function register() {
            const u = document.getElementById("txtUsername").value;
            const p = document.getElementById("txtPassword").value;
            
            if(!u || !p) {
                mostrarMensajeLogin("Llena todos los campos.", "red");
                return;
            }

            const res = await fetch('/api/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ Username: u, PasswordHash: p }) 
            });
            
            if (res.ok) {
                mostrarMensajeLogin("¡Registro exitoso! Ahora inicia sesión.", "green");
            } else {
                mostrarMensajeLogin("Error: El usuario ya existe o datos inválidos.", "red");
            }
        }

        async function login() {
            const u = document.getElementById("txtUsername").value;
            const p = document.getElementById("txtPassword").value;
            
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ Username: u, PasswordHash: p })
            });
            
            if (res.ok) {
                const userData = await res.json();
                miUsuario = userData.username;
                
                document.getElementById("loginZone").style.display = "none";
                document.getElementById("gameZone").style.display = "block";
                
                document.getElementById("lblUsername").innerText = userData.username;
                document.getElementById("lblWon").innerText = userData.gamesWon;
                document.getElementById("lblLost").innerText = userData.gamesLost;
                document.getElementById("lblDraws").innerText = userData.draws;

                iniciarSignalR();
            } else {
                mostrarMensajeLogin("Credenciales incorrectas.", "red");
            }
        }

        function cerrarSesion() {
            if (connection) {
                connection.stop();
            }
            // Limpiamos variables y recargamos la página para volver al login
            miUsuario = "";
            miRoomId = "";
            window.location.reload();
        }

        function mostrarMensajeLogin(texto, color) {
            const msg = document.getElementById("loginMessage");
            msg.innerText = texto;
            msg.style.color = color;
        }

        // --- SIGNALR (Lógica del Juego) ---
        function iniciarSignalR() {
            connection = new signalR.HubConnectionBuilder().withUrl("/gamehub").build();

            connection.on("WaitingForOpponent", () => {
                document.getElementById("status").innerText = "Esperando a otro jugador...";
                document.getElementById("btnBuscar").disabled = true;
            });

            connection.on("GameStarted", (game) => {
                miRoomId = game.roomId;
                document.getElementById("status").innerText = "¡Juego Iniciado!";
                
                let isPlayer1 = game.player1.connectionId === connection.connectionId;
                let opponentName = isPlayer1 ? game.player2.name : game.player1.name;
                let oponenteLbl = document.getElementById("opponentName");
                oponenteLbl.innerText = "⚔️ Enfrentando a: " + opponentName;
                oponenteLbl.style.display = "block";

                document.getElementById("board").style.display = "grid";
                document.getElementById("btnRendirse").style.display = "inline-block";
                document.getElementById("btnBuscar").style.display = "none";
                actualizarInterfaz(game);
            });

            connection.on("UpdateBoard", (game) => actualizarInterfaz(game));
            
            connection.on("GameRestarted", (game) => {
                document.getElementById("btnRestart").style.display = "none";
                actualizarInterfaz(game);
            });

            connection.on("OpponentLeft", () => {
                alert("El oponente huyó de la sala. Busca una nueva partida.");
                limpiarPantalla();
            });

            connection.start()
                .then(() => document.getElementById("status").innerText = "Conectado al servidor. Listo para jugar.")
                .catch(err => console.error(err));
        }

        // --- ACCIONES DEL JUEGO ---
        function buscarPartida() {
            limpiarPantalla();
            connection.invoke("FindMatch", miUsuario).catch(err => console.error(err));
        }

        function hacerMovimiento(posicion) {
            if(!miRoomId) return;
            connection.invoke("MakeMove", miRoomId, posicion).catch(err => console.error(err));
        }

        function reiniciarPartida() {
            if(!miRoomId) return;
            connection.invoke("RestartGame", miRoomId).catch(err => console.error(err));
        }

        function rendirse() {
            // Simulamos desconexión para forzar la rendición
            connection.stop().then(() => {
                document.getElementById("status").innerText = "Te rendiste. Reconectando...";
                limpiarPantalla();
                // Sumamos una derrota visualmente
                document.getElementById("lblLost").innerText = parseInt(document.getElementById("lblLost").innerText) + 1;
                
                // Reconectamos para que pueda buscar otra partida
                setTimeout(() => iniciarSignalR(), 1000);
            });
        }

        function limpiarPantalla() {
            miRoomId = "";
            document.getElementById("board").style.display = "none";
            document.getElementById("btnRestart").style.display = "none";
            document.getElementById("btnRendirse").style.display = "none";
            document.getElementById("btnBuscar").style.display = "inline-block";
            document.getElementById("btnBuscar").disabled = false;
            document.getElementById("turnStatus").innerText = "";
            document.getElementById("status").innerText = "Listo para jugar.";
            document.getElementById("opponentName").style.display = "none";
        }

        function actualizarInterfaz(game) {
            // Dibujar tablero y asignar colores
            for(let i = 0; i < 9; i++) {
                const boton = document.getElementById(`cell-${i}`);
                const simbolo = game.board[i] || "";
                boton.innerText = simbolo;
                
                if (simbolo === "X") boton.style.color = "#dc3545"; // Rojo
                else if (simbolo === "O") boton.style.color = "#007bff"; // Azul
                else boton.style.color = "#212529"; // Oscuro por defecto
            }

            const turnStatus = document.getElementById("turnStatus");
            
            if (game.isGameOver) {
                document.getElementById("btnRestart").style.display = "inline-block";
                document.getElementById("btnRendirse").style.display = "none";

                // Actualizar estadísticas visuales (la base de datos ya se actualizó en el backend)
                if (game.winnerConnectionId === "Empate") {
                    turnStatus.innerText = "¡EMPATE!"; 
                    turnStatus.style.color = "orange";
                    document.getElementById("lblDraws").innerText = parseInt(document.getElementById("lblDraws").innerText) + 1;
                } else {
                    if (game.winnerConnectionId === connection.connectionId) {
                        turnStatus.innerText = "¡GANASTE!"; 
                        turnStatus.style.color = "green";
                        document.getElementById("lblWon").innerText = parseInt(document.getElementById("lblWon").innerText) + 1;
                    } else {
                        turnStatus.innerText = "¡PERDISTE!"; 
                        turnStatus.style.color = "red";
                        document.getElementById("lblLost").innerText = parseInt(document.getElementById("lblLost").innerText) + 1;
                    }
                }
            } else {
                if (game.currentTurnConnectionId === connection.connectionId) {
                    turnStatus.innerText = "Es tu turno..."; 
                    turnStatus.style.color = "green";
                } else {
                    turnStatus.innerText = "Esperando al oponente..."; 
                    turnStatus.style.color = "red";
                }
            }
        }
    </script>
</body>
</html>
